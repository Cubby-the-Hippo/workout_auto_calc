<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>6-Week Hockey GPP — Smart Training Log</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
    .week-tab.active {
      background: linear-gradient(135deg, #059669 0%, #10b981 100%);
      color: #fff;
      box-shadow: 0 4px 14px rgba(16, 185, 129, 0.35);
    }
    .badge-target {
      background: linear-gradient(135deg, #047857 0%, #10b981 100%);
      box-shadow: 0 2px 10px rgba(16, 185, 129, 0.4);
    }
    .superset-ring {
      border: 2px solid rgba(16, 185, 129, 0.38);
      background: rgba(16, 185, 129, 0.05);
    }
    .input-indigo {
      min-height: 48px;
      border-color: rgba(99, 102, 241, 0.5);
    }
    .input-indigo:focus {
      border-color: #818cf8;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.22);
    }
  </style>
</head>
<body class="min-h-screen bg-slate-900 text-slate-100 antialiased selection:bg-emerald-600/30">

  <div id="app" class="mx-auto max-w-7xl px-4 pb-24 pt-4 sm:px-6 lg:px-8">

    <header class="mb-4 rounded-2xl border border-slate-700/80 bg-slate-800 p-4 sm:p-6">
      <div class="mb-2 flex items-center gap-2">
        <svg class="h-7 w-7 shrink-0 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z" />
        </svg>
        <h1 class="text-lg font-bold text-white sm:text-2xl">Hockey GPP Smart Log</h1>
      </div>
      <p id="phase-banner" class="text-sm font-semibold leading-snug text-indigo-300 sm:text-base"></p>
      <p id="week-hint" class="mt-3 hidden rounded-xl border border-indigo-500/25 bg-indigo-500/10 px-3 py-2.5 text-xs leading-relaxed text-indigo-200/90"></p>
    </header>

    <nav id="week-tabs" class="mb-5 flex gap-2.5 overflow-x-auto pb-2" aria-label="Training week"></nav>

    <div id="schedule-grid" class="grid gap-5 lg:grid-cols-2 xl:grid-cols-4"></div>
  </div>

  <script>
(function () {
  'use strict';

  const STORAGE_ACTIVE_WEEK = 'gppActiveWeek';
  const LOG_PREFIX = 'gpp-log';

  const TYPE = { MAIN: 'main', WEIGHTED: 'weighted', ISO: 'isometric', PLYO: 'plyo', FLOOR_VOL: 'floor_vol', FLOOR_ISO: 'floor_iso' };

  const EX_TYPE = {
    'broad-jump': TYPE.PLYO,
    'back-squat': TYPE.MAIN,
    'trap-bar-split-squat': TYPE.WEIGHTED,
    'barbell-hip-thrust': TYPE.MAIN,
    'copenhagen-iso': TYPE.ISO,
    'pallof-press-iso': TYPE.ISO,
    'prone-supermans': TYPE.FLOOR_VOL,
    'plyo-plate-push-ups': TYPE.PLYO,
    'weighted-chin-ups': TYPE.WEIGHTED,
    'incline-chest-press': TYPE.WEIGHTED,
    'chest-supported-row': TYPE.WEIGHTED,
    'half-kneeling-landmine-press': TYPE.WEIGHTED,
    'face-pulls': TYPE.PLYO,
    'external-rotations': TYPE.PLYO,
    'lateral-bound-to-stick': TYPE.PLYO,
    'front-squat': TYPE.MAIN,
    'rdl': TYPE.WEIGHTED,
    'landmine-lateral-lunge': TYPE.WEIGHTED,
    'reverse-uphill-walks': TYPE.PLYO,
    'abductor-squeeze': TYPE.ISO,
    'side-plank': TYPE.ISO,
    'prone-cobra': TYPE.FLOOR_ISO,
    'two-point-start-accels': TYPE.PLYO,
    'three-t-cod-drill': TYPE.PLYO,
    'continuous-single-leg-forward-bounds': TYPE.PLYO,
    'hang-clean': TYPE.MAIN
  };

  const PHASE = {
    1: 'Accumulation Phase - Building capacity and tissue tolerance.',
    2: 'Accumulation Phase - Building capacity and tissue tolerance.',
    3: 'Accumulation Phase - Building capacity and tissue tolerance.',
    4: 'Functional Overreaching - Peak GPP Volume. Fight for every clean rep!',
    5: 'Functional Overreaching - Peak GPP Volume. Fight for every clean rep!',
    6: 'Deload Phase - Active recovery. Flashing fatigue to reveal massive fitness gains.'
  };

  let activeWeek = 1;
  const $ = (s) => document.querySelector(s);
  const scheduleGrid = $('#schedule-grid');

  function round5(n) { return Math.round(Number(n) / 5) * 5; }
  function esc(s) {
    return String(s ?? '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
  }

  function logKey(week, day, exerciseId, field) {
    return `${LOG_PREFIX}-w${week}-${day}-${exerciseId}-${field}`;
  }

  function readLog(week, day, exerciseId) {
    const lbs = localStorage.getItem(logKey(week, day, exerciseId, 'lbs'));
    const reps = localStorage.getItem(logKey(week, day, exerciseId, 'reps'));
    const seconds = localStorage.getItem(logKey(week, day, exerciseId, 'seconds'));
    return {
      lbs: lbs !== '' && lbs != null ? Number(lbs) : null,
      reps: reps !== '' && reps != null ? parseInt(reps, 10) : null,
      seconds: seconds !== '' && seconds != null ? parseInt(seconds, 10) : null
    };
  }

  function writeLog(week, day, exerciseId, field, value) {
    const k = logKey(week, day, exerciseId, field);
    const v = String(value).trim();
    if (v === '') localStorage.removeItem(k);
    else localStorage.setItem(k, v);
  }

  function w1(day, exerciseId) { return readLog(1, day, exerciseId); }

  function hasLbsReps(b) {
    return b.lbs != null && !Number.isNaN(b.lbs) && b.reps != null && !Number.isNaN(b.reps);
  }
  function hasSeconds(b) { return b.seconds != null && !Number.isNaN(b.seconds); }

  function hangCleanRx(week) {
    if (week === 1) return { sets: 3, reps: 5 };
    if (week === 2) return { sets: 4, reps: 5 };
    if (week === 3) return { sets: 5, reps: 5 };
    if (week === 4) return { sets: 6, reps: 5 };
    if (week === 5) return { sets: 4, reps: 4 };
    return { sets: 2, reps: 3 };
  }

  function singleLegBoundsRx(week) {
    if (week >= 4 && week <= 5) return { sets: 2, distance: '10-15m' };
    return { sets: 1, distance: '10-15m' };
  }

  function hangCleanTarget(week, day) {
    const b = w1(day, 'hang-clean');
    if (!hasLbsReps(b)) return null;
    const sr = hangCleanRx(week);

    if (week === 6) {
      return {
        text: `${round5(b.lbs * 0.8)} lbs × ${sr.reps} reps`,
        sub: `${sr.sets} sets · Deload · 50–60% max`
      };
    }

    const incMap = { 2: 5, 3: 10, 4: 10, 5: 20 };
    const inc = incMap[week];
    if (!inc) return null;

    const subLabels = {
      2: `${sr.sets} sets · 50–60% max`,
      3: `${sr.sets} sets · Volume step up`,
      4: `${sr.sets} sets · Peak Volume`,
      5: `${sr.sets} sets · Weight Peak (+20 lbs over Week 1)`
    };

    return {
      text: `${round5(b.lbs + inc)} lbs × ${sr.reps} reps`,
      sub: subLabels[week]
    };
  }

  function mainLiftRx(week) {
    if (week <= 2) return { sets: 3, reps: 8 };
    if (week <= 5) return { sets: 4, reps: 8 };
    return { sets: 2, reps: 6 };
  }

  function weightedSets(week) {
    if (week === 6) return 2;
    if (week <= 3) return 3;
    return 4;
  }

  function isoSets(week) {
    if (week === 6) return 2;
    if (week <= 3) return 3;
    return 4;
  }

  function plyoSets(base, week) {
    return week === 6 ? 2 : base;
  }

  function proneSupermansRx(week) {
    if (week <= 2) return { sets: 2, reps: 15 };
    if (week <= 4) return { sets: 3, reps: 15 };
    if (week === 5) return { sets: 3, reps: 20 };
    return { sets: 1, reps: 12 };
  }

  function proneCobraRx(week) {
    if (week <= 2) return { sets: 2, seconds: 30 };
    if (week <= 4) return { sets: 3, seconds: 30 };
    if (week === 5) return { sets: 3, seconds: 45 };
    return { sets: 1, seconds: 20 };
  }

  function floorVolumeTarget(week, exerciseId) {
    const rx = exerciseId === 'prone-supermans' ? proneSupermansRx(week) : null;
    if (!rx) return null;
    const sub = week === 5 ? 'Peak volume' : week === 6 ? 'Deload' : `${rx.sets} sets`;
    return { text: `${rx.sets} sets × ${rx.reps} reps`, sub };
  }

  function floorIsoHoldTarget(week, exerciseId) {
    const rx = exerciseId === 'prone-cobra' ? proneCobraRx(week) : null;
    if (!rx) return null;
    const sub = week === 5 ? 'Peak hold' : week === 6 ? 'Deload' : `${rx.sets} sets`;
    return { text: `${rx.sets} sets × ${rx.seconds} seconds`, sub };
  }

  function mainTarget(week, day, exerciseId) {
    const b = w1(day, exerciseId);
    if (!hasLbsReps(b)) return null;

    const sr = mainLiftRx(week);

    if (week === 6) {
      return {
        text: `${round5(b.lbs * 0.8)} lbs × ${sr.reps} reps`,
        sub: `${sr.sets} sets · Deload`
      };
    }

    const incMap = { 2: 5, 3: 10, 4: 15, 5: 20 };
    const inc = incMap[week];
    if (!inc) return null;

    const sets = week === 2 ? 3 : 4;
    const labels = {
      2: `${sets} sets`,
      3: `${sets} sets · Volume step up`,
      4: `${sets} sets · Almost Max Peak`,
      5: `${sets} sets · 🔥 Absolute Max Peak`
    };

    return {
      text: `${round5(b.lbs + inc)} lbs × 8 reps`,
      sub: labels[week]
    };
  }

  function weightedTarget(week, day, exerciseId) {
    const b = w1(day, exerciseId);
    if (!hasLbsReps(b)) return null;
    const sets = weightedSets(week);

    if (week === 6) {
      const reps = Math.max(1, b.reps - 2);
      return { text: `${round5(b.lbs * 0.85)} lbs × ${reps} reps`, sub: `${sets} sets · Deload` };
    }

    const lbs = round5(b.lbs + 5);
    if (week <= 3) {
      return { text: `${lbs} lbs × ${b.reps} reps`, sub: `${sets} sets` };
    }
    return { text: `${lbs} lbs × ${b.reps + 1} reps`, sub: `${sets} sets · GPP accessory overreach` };
  }

  function isoTarget(week, day, exerciseId) {
    const b = w1(day, exerciseId);
    if (!hasSeconds(b)) return null;
    const sets = isoSets(week);
    if (week === 6) return { text: '15 seconds', sub: `${sets} sets · Deload` };
    if (week <= 3) return { text: `${b.seconds} seconds`, sub: `${sets} sets` };
    return { text: `${b.seconds + 5} seconds`, sub: `${sets} sets` };
  }

  function computeTarget(week, day, exerciseId) {
    if (exerciseId === 'hang-clean') return hangCleanTarget(week, day);
    const type = EX_TYPE[exerciseId];
    if (type === TYPE.MAIN) return mainTarget(week, day, exerciseId);
    if (type === TYPE.WEIGHTED) return weightedTarget(week, day, exerciseId);
    if (type === TYPE.ISO) return isoTarget(week, day, exerciseId);
    return null;
  }

  function targetBadge(t) {
    return `
      <div class="mt-3 space-y-1">
        <span class="badge-target inline-flex min-h-[44px] w-full flex-wrap items-center rounded-xl px-4 py-2.5 text-sm font-bold text-white sm:text-base">
          Target: ${t.text}
        </span>
        ${t.sub ? `<p class="text-[11px] font-medium text-emerald-400/80">${t.sub}</p>` : ''}
      </div>`;
  }

  function pendingText() {
    return `<p class="mt-2 text-xs italic text-slate-500">Pending Week 1 Data</p>`;
  }

  function week1LbsRepsInputs(day, exerciseId) {
    if (activeWeek !== 1) return '';
    const b = readLog(1, day, exerciseId);
    const cls = 'input-indigo w-[5.25rem] shrink-0 rounded-xl border bg-slate-950 px-3 py-3 text-base font-semibold text-white outline-none sm:w-24';
    return `
      <div class="mt-3 flex flex-wrap items-center gap-2.5 border-t border-slate-700/50 pt-3">
        <span class="w-full text-[10px] font-bold uppercase tracking-widest text-indigo-400">Log Week 1 baseline</span>
        <input type="text" inputmode="decimal" placeholder="lbs" aria-label="Weight lbs" autocomplete="off"
          class="${cls}" data-log-week="1" data-log-day="${day}" data-log-exercise="${exerciseId}" data-log-field="lbs"
          value="${esc(b.lbs ?? '')}" />
        <span class="text-slate-600">×</span>
        <input type="text" inputmode="numeric" placeholder="reps" aria-label="Reps" autocomplete="off"
          class="${cls}" data-log-week="1" data-log-day="${day}" data-log-exercise="${exerciseId}" data-log-field="reps"
          value="${esc(b.reps ?? '')}" />
      </div>`;
  }

  function week1SecondsInput(day, exerciseId) {
    if (activeWeek !== 1) return '';
    const b = readLog(1, day, exerciseId);
    const cls = 'input-indigo w-full max-w-[9rem] rounded-xl border bg-slate-950 px-3 py-3 text-base font-semibold text-white outline-none';
    return `
      <div class="mt-3 border-t border-slate-700/50 pt-3">
        <span class="mb-2 block text-[10px] font-bold uppercase tracking-widest text-indigo-400">Log Week 1 hold</span>
        <input type="text" inputmode="numeric" placeholder="seconds" aria-label="Seconds" autocomplete="off"
          class="${cls}" data-log-week="1" data-log-day="${day}" data-log-exercise="${exerciseId}" data-log-field="seconds"
          value="${esc(b.seconds ?? '')}" />
      </div>`;
  }

  function week1RepsOnlyInput(day, exerciseId) {
    if (activeWeek !== 1) return '';
    const b = readLog(1, day, exerciseId);
    const cls = 'input-indigo w-full max-w-[9rem] rounded-xl border bg-slate-950 px-3 py-3 text-base font-semibold text-white outline-none';
    return `
      <div class="mt-3 border-t border-slate-700/50 pt-3">
        <span class="mb-2 block text-[10px] font-bold uppercase tracking-widest text-indigo-400">Log Week 1 reps</span>
        <input type="text" inputmode="numeric" placeholder="reps" aria-label="Reps" autocomplete="off"
          class="${cls}" data-log-week="1" data-log-day="${day}" data-log-exercise="${exerciseId}" data-log-field="reps"
          value="${esc(b.reps ?? '')}" />
      </div>`;
  }

  function actionZone(week, day, exerciseId) {
    const type = EX_TYPE[exerciseId];
    if (type === TYPE.PLYO) return '';
    if (type === TYPE.FLOOR_VOL) {
      if (week === 1) return week1RepsOnlyInput(day, exerciseId);
      const t = floorVolumeTarget(week, exerciseId);
      return t ? targetBadge(t) : '';
    }
    if (type === TYPE.FLOOR_ISO) {
      if (week === 1) return week1SecondsInput(day, exerciseId);
      const t = floorIsoHoldTarget(week, exerciseId);
      return t ? targetBadge(t) : '';
    }
    if (week === 1) {
      if (type === TYPE.MAIN || type === TYPE.WEIGHTED) return week1LbsRepsInputs(day, exerciseId);
      if (type === TYPE.ISO) return week1SecondsInput(day, exerciseId);
      return '';
    }
    const t = computeTarget(week, day, exerciseId);
    if (!t) return pendingText();
    return targetBadge(t);
  }

  function rxWeighted(week, repRange) {
    return `${weightedSets(week)}×(${repRange})`;
  }

  function rxIso(week, timeRange) {
    return `${isoSets(week)}×(${timeRange})`;
  }

  function exerciseCard(num, day, exerciseId, title, rx, meta, week, note) {
    const noteHtml = note ? `<p class="mt-1 text-xs font-medium text-amber-400/90">${note}</p>` : '';
    return `
      <div class="rounded-xl border border-slate-700/55 bg-slate-900/55 p-4">
        <div class="flex gap-3">
          <span class="flex h-11 w-11 shrink-0 items-center justify-center rounded-xl bg-slate-700 text-sm font-bold text-emerald-400">${num}</span>
          <div class="min-w-0 flex-1">
            <h4 class="text-base font-semibold leading-snug text-white">${title}</h4>
            <p class="mt-1.5 text-sm font-medium text-slate-200">${rx}</p>
            ${noteHtml}
            ${meta ? `<p class="mt-1.5 text-xs leading-relaxed text-slate-400">${meta}</p>` : ''}
            ${actionZone(week, day, exerciseId)}
          </div>
        </div>
      </div>`;
  }

  function superset(day, week, items) {
    const body = items.map((it) =>
      exerciseCard(it.num, day, it.id, it.title, it.rx, it.meta, week, it.note ?? null)
    ).join('');
    return `
      <div class="superset-ring space-y-3 rounded-2xl p-3 sm:p-4" role="group" aria-label="Superset">
        <p class="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-emerald-500">
          <svg class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" d="M8.25 6h7.5M6 12h12M8.25 18h7.5"/></svg>
          Superset — back-to-back
        </p>
        ${body}
      </div>`;
  }

  function dayCard(name, sub, html) {
    return `
      <article class="flex flex-col rounded-2xl border border-slate-700/80 bg-slate-800 shadow-xl">
        <div class="border-b border-slate-700/80 px-4 py-4">
          <h3 class="text-lg font-bold text-emerald-400">${name}</h3>
          <p class="text-xs text-slate-400 sm:text-sm">${sub}</p>
        </div>
        <div class="space-y-3 p-4">${html}</div>
      </article>`;
  }

  function buildTuesday(week) {
    const day = 'tuesday';
    const ml = mainLiftRx(week);
    const parts = [];
    parts.push(exerciseCard('1', day, 'broad-jump', 'Broad Jump', `${plyoSets(3, week)}×(2-4 reps)`, '90s rest | Stay explosive', week, null));
    parts.push(exerciseCard('2', day, 'back-squat', 'Back Squat', `${ml.sets}×${ml.reps} reps`, null, week, week === 5 ? 'GPP Volume Peak' : null));
    parts.push(exerciseCard('3', day, 'trap-bar-split-squat', 'Trap Bar Split Squat', rxWeighted(week, '6-8 RL'), '2 RIR | 75s rest', week, null));
    parts.push(exerciseCard('4', day, 'barbell-hip-thrust', 'Barbell Hip Thrust', `${ml.sets}×(6-8 reps)`, null, week, null));
    parts.push(superset(day, week, [
      { num: '5a', id: 'copenhagen-iso', title: 'Copenhagen Iso', rx: rxIso(week, '20-30 sec'), meta: '60s rest' },
      { num: '5b', id: 'pallof-press-iso', title: 'Pallof Press Iso', rx: rxIso(week, '20-30 sec'), meta: 'Superset with Copenhagen' }
    ]));
    const ps = proneSupermansRx(week);
    parts.push(exerciseCard('6', day, 'prone-supermans', 'Prone Supermans', `${ps.sets}×${ps.reps} reps`, 'Pure lower back and glute stamina flush.', week, week === 5 ? 'Peak volume' : week === 6 ? 'Deload' : null));
    return dayCard('Tuesday', 'Lower / Core', parts.join(''));
  }

  function buildThursday(week) {
    const day = 'thursday';
    const acc = week === 6 ? 2 : '2-3';
    const parts = [];
    parts.push(superset(day, week, [
      { num: '1a', id: 'plyo-plate-push-ups', title: 'Plyo Plate Push Ups', rx: `${plyoSets('3-4', week)}×(30 sec)`, meta: '60s rest | Explosive' },
      { num: '1b', id: 'weighted-chin-ups', title: 'Weighted Chin Ups', rx: `${weightedSets(week)}×(6-8 reps)`, meta: '1-3 RIR' }
    ]));
    parts.push(exerciseCard('2', day, 'incline-chest-press', 'Incline Chest Press', rxWeighted(week, '6-8 reps'), '2 min rest | 2 RIR', week, null));
    parts.push(exerciseCard('3', day, 'chest-supported-row', 'Chest Supported Row', rxWeighted(week, '8-10 reps'), '75s rest | Controlled negative', week, null));
    parts.push(exerciseCard('4', day, 'half-kneeling-landmine-press', 'Half Kneeling Landmine Press', rxWeighted(week, '6-8 RL'), '75s rest', week, null));
    parts.push(superset(day, week, [
      { num: '5a', id: 'face-pulls', title: 'Face Pulls', rx: `${acc}×(12-15 reps)`, meta: 'Accessories' },
      { num: '5b', id: 'external-rotations', title: 'External Rotations', rx: `${acc}×(12-15 reps)`, meta: 'Accessories' }
    ]));
    return dayCard('Thursday', 'Upper Body', parts.join(''));
  }

  function buildFriday(week) {
    const day = 'friday';
    const ml = mainLiftRx(week);
    const parts = [];
    parts.push(exerciseCard('1', day, 'lateral-bound-to-stick', 'Lateral Bound to Stick', '3-4×(2-3 RL)', '90s rest | Focus on landing mechanics', week, null));
    parts.push(exerciseCard('2', day, 'front-squat', 'Front Squat', `${ml.sets}×${ml.reps} reps`, null, week, week === 5 ? 'GPP Volume Peak' : null));
    parts.push(exerciseCard('3', day, 'rdl', 'RDL', rxWeighted(week, '6-8 reps'), '2 RIR | Focus on hamstring stretch', week, null));
    parts.push(exerciseCard('4', day, 'landmine-lateral-lunge', 'Landmine Lateral Lunge', rxWeighted(week, '6-8 RL'), '60-90s rest', week, null));
    parts.push(exerciseCard('5', day, 'reverse-uphill-walks', 'Reverse Uphill Walks', week === 6 ? '2 reps total' : '4×(2 Hill Reps)', 'Pump quadriceps / patella health', week, null));
    parts.push(superset(day, week, [
      { num: '6a', id: 'abductor-squeeze', title: 'Abductor Squeeze', rx: rxIso(week, '20-30 sec'), meta: 'Groin bulletproofing' },
      { num: '6b', id: 'side-plank', title: 'Side Plank', rx: rxIso(week, '20-30 sec'), meta: 'Core structural balance' }
    ]));
    const pc = proneCobraRx(week);
    parts.push(exerciseCard('7', day, 'prone-cobra', 'Prone Cobra', `${pc.sets}×${pc.seconds} sec`, 'Hold top position with thumbs up to target postural muscles.', week, week === 5 ? 'Peak hold' : week === 6 ? 'Deload' : null));
    return dayCard('Friday', 'Lower / Posterior', parts.join(''));
  }

  function buildSunday(week) {
    const day = 'sunday';
    const hc = hangCleanRx(week);
    const bounds = singleLegBoundsRx(week);
    const parts = [];
    parts.push(exerciseCard('1', day, 'two-point-start-accels', '2 Point Start Accels', '1-3×(15-20m)', 'Full recovery | 2-3 min rest', week, null));
    parts.push(exerciseCard('2', day, 'three-t-cod-drill', '3 T COD Drill', '1×(4 reps total)', 'Game speed change of direction', week, null));
    parts.push(exerciseCard('3', day, 'continuous-single-leg-forward-bounds', 'Continuous Single-Leg Forward Bounds', `${bounds.sets}×(${bounds.distance})`, 'Controlled rhythm · stick each landing', week, week >= 4 && week <= 5 ? 'Overreach peak' : null));
    parts.push(exerciseCard('4', day, 'hang-clean', 'Hang Clean', `${hc.sets}×${hc.reps} reps`, 'High-Set Volume Engine · 50–60% max', week, week === 5 ? 'Weight Peak — stay fast & crisp' : week === 4 ? 'Peak Volume' : week === 6 ? 'Light technical work' : null));
    return dayCard('Sunday', 'Speed / Power / Alactic', parts.join(''));
  }

  function renderSchedule() {
    scheduleGrid.innerHTML = [
      buildTuesday(activeWeek),
      buildThursday(activeWeek),
      buildFriday(activeWeek),
      buildSunday(activeWeek)
    ].join('');
  }

  function updateHeader() {
    $('#phase-banner').textContent = PHASE[activeWeek];
    const hint = $('#week-hint');
    if (activeWeek === 1) {
      hint.classList.remove('hidden');
      hint.textContent = 'Week 1 baseline collection — log lbs × reps (barbell & accessories) and seconds (isometrics). Weeks 2–6 auto-calculate from these values. Saves instantly to this device.';
    } else {
      hint.classList.add('hidden');
    }
  }

  function renderWeekTabs() {
    const nav = $('#week-tabs');
    nav.innerHTML = '';
    for (let w = 1; w <= 6; w++) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'week-tab min-h-[52px] min-w-[84px] shrink-0 rounded-xl border border-slate-600 bg-slate-800 px-5 py-3.5 text-sm font-bold text-slate-300 active:scale-[0.97]';
      btn.textContent = `Week ${w}`;
      if (w === activeWeek) btn.classList.add('active');
      btn.addEventListener('click', () => {
        activeWeek = w;
        localStorage.setItem(STORAGE_ACTIVE_WEEK, String(w));
        renderWeekTabs();
        renderSchedule();
        updateHeader();
      });
      nav.appendChild(btn);
    }
  }

  function bindInputs() {
    if (scheduleGrid.dataset.bound) return;
    scheduleGrid.dataset.bound = '1';
    scheduleGrid.addEventListener('input', (e) => {
      const t = e.target;
      if (!t.dataset.logExercise) return;
      writeLog(Number(t.dataset.logWeek), t.dataset.logDay, t.dataset.logExercise, t.dataset.logField, t.value);
    });
  }

  function init() {
    const saved = parseInt(localStorage.getItem(STORAGE_ACTIVE_WEEK), 10);
    if (saved >= 1 && saved <= 6) activeWeek = saved;
    bindInputs();
    renderWeekTabs();
    updateHeader();
    renderSchedule();
  }

  init();
})();
  </script>
</body>
</html>
